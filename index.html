    html {

    height: 100%;

body {
    /* Remove margens padrão do navegador */
    margin: 0;
    padding: 0;

    /* Define a altura mínima como 100% da janela (Viewport Height) */
    min-height: 100vh;
    
    /* Garante que o fundo roxo escuro preencha tudo */
    background-color: #1a0136; /* Substitua pela cor exata do seu fundo roxo */
    
    /* Evita barras de rolagem lateral indesejadas */
    overflow-x: hidden;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle at center, #2e004f 0%, #000000 100%);

        .name, .logo-name, .platform-name, .header p {

        .header {

            height: 200px;

            background-position: center 1%;

            padding: 0 40px;
            margin-bottom: 40px;
        }
        
        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8a2be2;
            box-shadow: 0 8px 25px rgba(138,43,226,0.3);
        }
        
        .name {

            font-weight: bold;
            color: #e0b0ff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);

        .top-logos {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        
        .logo-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo-item:hover {
            transform: translateY(-5px);
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(138,43,226,0.15);
            border-radius: 15px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(138,43,226,0.3);
        }
        
        .logo-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        
        .logo-name {
            font-size: 1.2em;
            color: #e0b0ff;
            padding: 4px 12px;
            background: rgba(138,43,226,0.1);
            border-radius: 20px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px 50px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(138,43,226,0.2);
        }
        
        .photo-card:hover {
            transform: translateY(-10px);
            background: rgba(138,43,226,0.08);
        }
        
        .photo-container {
            position: relative;
            width: 100%;
            height: 320px;
        }
        
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .photo-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .photo-logo i { color: #2e004f; font-size: 1.2em; }
        .photo-logo img { width: 25px; height: 25px; }
        
        .platform-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            text-align: center;
            color: #e0b0ff;
            font-size: 1.8em;
            background: rgba(20, 0, 40, 0.85);
            border-top: 1px solid rgba(138,43,226,0.3);
        }
        
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            .name { font-size: 2.2em; }
        }
    /* Isso cria a animação chamada 'pulsoRoxo' */
@keyframes pulsoRoxo {
    0% {
        /* Estado inicial: borda normal e sem sombra */
        border-color: rgba(138, 43, 226, 0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    50% {
        /* Estado meio: borda acesa e sombra brilhante */
        border-color: #a020f0; /* Um roxo mais claro */
        box-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; /* Brilho neon */
    }
    100% {
        /* Estado final: volta ao normal */
        border-color: rgba(138, 43, 226, 0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
}

/* Isso aplica a animação a qualquer coisa com a classe 'piscando' */
.piscando {
    /* Nome da animação, duração (1.5 segundos), modo (infinito) */
    animation: pulsoRoxo 1.5s infinite;
}
